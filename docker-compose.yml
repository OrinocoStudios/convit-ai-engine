# Stack mínimo: API + MongoDB. Pinky (Brain) y Ollama no están definidos aquí:
# configura BRAIN_SERVICE_URL hacia el host donde corran (p. ej. host.docker.internal:8081).
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/convit
      # Vite (5173) y front en otro puerto si aplica; separados por coma.
      - CORS_ORIGINS=http://localhost:5173,http://localhost:8080
      # Sin servicio brain-service en este archivo: sobrescribe en override local o apunta a host.docker.internal
      - BRAIN_SERVICE_URL=http://host.docker.internal:8081
      - BRAIN_SERVICE_API_KEY=
      - STORAGE_BASE_PATH=/app/storage
    depends_on:
      - mongo
    volumes:
      - backend_storage:/app/storage

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
  backend_storage:
