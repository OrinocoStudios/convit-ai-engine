# Stack mínimo: API + MongoDB. Pinky (Brain) y Ollama no están definidos aquí:
# configura BRAIN_SERVICE_URL hacia el host donde corran (p. ej. host.docker.internal:8000).
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/convit
      # Sin servicio brain-service en este archivo: sobrescribe en override local o apunta a host.docker.internal
      - BRAIN_SERVICE_URL=http://brain-service:8000
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
